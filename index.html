<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Market4u</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Arial',sans-serif;
background:linear-gradient(135deg,#79BE20,#25D366);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#fff;
border-radius:32px;
max-width:430px;
width:100%;
padding:32px 28px;
box-shadow:0 25px 60px rgba(0,0,0,.25);
text-align:center;
}

/* Estilização para imitar o Logo */
.logo-texto {
font-family: 'Arial Rounded MT Bold', 'Ubuntu', 'Montserrat', sans-serif;
font-size: 42px;
font-weight: 900;
letter-spacing: -1.5px;
margin-bottom: 20px;
display: inline-block;
}

.logo-texto .preto {
color: #000000;
}

.logo-texto .verde {
color: #79BE20;
}

h1{
font-size:30px;
color:#222;
margin:8px 0;
}

p{
color:#666;
font-size:16px;
margin-bottom:28px;
}

.btn{
display:flex;
align-items:center;
gap:15px;
width:100%;
text-decoration:none;
color:white;
padding:17px 20px;
border-radius:20px;
margin:15px 0;
font-weight:bold;
font-size:19px;
border:none;
cursor:pointer;
transition:.25s;
text-align:left;
}

.btn:hover{
transform:scale(1.02);
}

.icon{
width:48px;
height:48px;
border-radius:50%;
background:rgba(255,255,255,.20);
display:flex;
align-items:center;
justify-content:center;
font-size:23px;
flex-shrink:0;
}

.sub{
display:block;
font-size:13px;
font-weight:normal;
margin-top:3px;
opacity:.9;
}

.w{
background:#25D366;
}

.g{
background:#43A047;
}

.pix{
background:#79BE20;
}

#msg{
display:none;
background:#e8f5e9;
color:#2e7d32;
padding:14px;
border-radius:14px;
margin-top:15px;
font-weight:bold;
}

footer{
margin-top:25px;
font-size:13px;
color:#999;
}
</style>
</head>

<body>

<div class="card">

<div class="logo-texto">
<span class="preto">market</span><span class="verde">4u</span>
</div>

<h1>Seja Bem-Vindo ao Sport Garden! 👋</h1>
<p>Escolha uma das opções abaixo.</p>

<a class="btn w" href="https://wa.me/5511926322503">
<div class="icon">💬</div>
<div>
Fale Conosco
<span class="sub">Atendimento via WhatsApp</span>
</div>
</a>

<a class="btn g" href="https://chat.whatsapp.com/LhbQkg7o3F1BOPlLqsELmG">
<div class="icon">🎁</div>
<div>
Grupo de Promoções
<span class="sub">Receba ofertas exclusivas</span>
</div>
</a>

<button class="btn pix" onclick="copiar()">
<div class="icon">💳</div>
<div>
Teve problema ao pagar?
<span class="sub">Copiar chave PIX</span>
</div>
</button>

<div id="msg">
✅ Chave PIX copiada com sucesso!
</div>

<footer>
Obrigado pela preferência ❤️
</footer>

</div>

<script>
function copiar(){
navigator.clipboard.writeText("7cd250a1-330b-46e2-8a02-785b8de57355");
let m=document.getElementById("msg");
m.style.display="block";
setTimeout(()=>{
m.style.display="none";
},2500);
}
</script>

</body>
</html>
